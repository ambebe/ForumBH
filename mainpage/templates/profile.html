<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }
        h1 {
            margin: 10px 0;
        }
        p {
            color: #555;
        }
        .social a {
            margin: 0 10px;
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/120" alt="Фото профиля">
    <h1>Твоё имя</h1>
    <p>Краткое описание о себе:</p>
    
    <div class="social">
        <a href="#">Instagram</a>
        <a href="#">Telegram</a>
        <a href="#">GitHub</a>
    </div>
</div>

</body>
</html>
